name: Reusable Auto Review

on:
  workflow_call:
    inputs:
      escalation_round:
        description: "Round N+ stops blocking PR, adds label for human review"
        type: number
        default: 3
      auto_dispatch_round:
        description: "Only auto-dispatch fix on round <= N (prevent loops)"
        type: number
        default: 1
      dispatch_employee:
        description: "Employee slug to dispatch when review fails (empty = ceo-assistant)"
        type: string
        default: ""
      max_diff_bytes:
        description: "Diff truncation threshold in bytes"
        type: number
        default: 50000
      review_timeout:
        description: "Review task polling timeout in seconds"
        type: number
        default: 300
      ci_wait_timeout:
        description: "CI checks wait timeout in seconds"
        type: number
        default: 600
    secrets:
      CREW_API_TOKEN:
        required: true

permissions:
  pull-requests: write
  contents: write
  checks: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate CREW_API_TOKEN
        id: token_check
        env:
          CREW_API_TOKEN: ${{ secrets.CREW_API_TOKEN }}
        run: |
          if [ -z "${CREW_API_TOKEN}" ]; then
            echo "::error::CREW_API_TOKEN is not configured — skipping entire review job"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Wait for CI checks to pass
        if: steps.token_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "Waiting for CI checks on PR #${PR_NUMBER}..."

          TIMEOUT=${{ inputs.ci_wait_timeout }}
          INTERVAL=15
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            CHECKS=$(gh pr checks "$PR_NUMBER" --json name,state 2>/dev/null || echo "[]")

            OTHER_CHECKS=$(echo "$CHECKS" | python3 -c "
          import json, sys
          checks = json.load(sys.stdin)
          others = [c for c in checks if c['name'] != 'review']
          if not others:
              print('WAITING')
              sys.exit(0)
          states = [c['state'] for c in others]
          if any(s == 'FAILURE' for s in states):
              print('FAILURE')
          elif all(s == 'SUCCESS' for s in states):
              print('SUCCESS')
          else:
              print('WAITING')
          ")

            if [ "$OTHER_CHECKS" = "SUCCESS" ]; then
              echo "All CI checks passed"
              break
            elif [ "$OTHER_CHECKS" = "FAILURE" ]; then
              echo "CI checks failed — skipping review"
              exit 0
            fi

            echo "  Checks still running... (${ELAPSED}s / ${TIMEOUT}s)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "Timeout waiting for CI checks — skipping review"
            exit 0
          fi

      - name: Determine review round
        if: steps.token_check.outputs.skip != 'true'
        id: round
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          LABELS=$(gh pr view "$PR_NUMBER" --json labels -q '.labels[].name' 2>/dev/null || echo "")

          CURRENT_ROUND=0
          for label in $LABELS; do
            if echo "$label" | grep -qE '^review-round-[0-9]+$'; then
              NUM=$(echo "$label" | sed 's/review-round-//')
              if [ "$NUM" -gt "$CURRENT_ROUND" ]; then
                CURRENT_ROUND=$NUM
              fi
            fi
          done

          NEXT_ROUND=$((CURRENT_ROUND + 1))
          echo "round=$NEXT_ROUND" >> "$GITHUB_OUTPUT"
          echo "Review round: $NEXT_ROUND"

      - name: Run code review
        if: steps.token_check.outputs.skip != 'true'
        id: review
        env:
          GH_TOKEN: ${{ github.token }}
          CREW_API_TOKEN: ${{ secrets.CREW_API_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          ROUND=${{ steps.round.outputs.round }}
          MAX_DIFF_BYTES=${{ inputs.max_diff_bytes }}

          # --- Large diff handling ---
          FULL_DIFF_SIZE=$(gh pr diff "$PR_NUMBER" | wc -c)
          DIFF_STAT=""
          if [ "$FULL_DIFF_SIZE" -gt "$MAX_DIFF_BYTES" ]; then
            echo "Diff too large (${FULL_DIFF_SIZE} bytes > ${MAX_DIFF_BYTES}). Using partial diff strategy."

            DIFF_STAT=$(gh pr diff "$PR_NUMBER" --stat)
            TOTAL_FILES=$(echo "$DIFF_STAT" | grep -cE '^\s*\S' || echo "0")

            TOP_FILES=$(echo "$DIFF_STAT" | python3 -c "
          import sys, re
          lines = sys.stdin.read().strip().split('\n')
          files = []
          for line in lines:
              m = re.match(r'^\s*(\S+)\s*\|\s*(\d+)', line)
              if m:
                  files.append((m.group(1), int(m.group(2))))
          files.sort(key=lambda x: -x[1])
          for f, _ in files[:10]:
              print(f)
          ")

            gh pr diff "$PR_NUMBER" > /tmp/pr_full_diff.txt
            > /tmp/pr_diff.txt
            for fname in $TOP_FILES; do
              python3 -c "
          import sys
          fname = sys.argv[1]
          in_file = False
          buf = []
          with open('/tmp/pr_full_diff.txt') as f:
              for line in f:
                  if line.startswith('diff --git'):
                      if in_file:
                          break
                      if fname in line:
                          in_file = True
                  if in_file:
                      buf.append(line)
          sys.stdout.write(''.join(buf))
          " "$fname" >> /tmp/pr_diff.txt
              CURRENT_SIZE=$(wc -c < /tmp/pr_diff.txt)
              if [ "$CURRENT_SIZE" -gt "$MAX_DIFF_BYTES" ]; then
                break
              fi
            done

            SHOWN_FILES=$(grep -c '^diff --git' /tmp/pr_diff.txt || echo "0")
            HEADER="[Partial diff: showing ${SHOWN_FILES}/${TOTAL_FILES} files with most changes]"
            { echo "$HEADER"; echo ""; cat /tmp/pr_diff.txt; } > /tmp/pr_diff_tmp.txt
            mv /tmp/pr_diff_tmp.txt /tmp/pr_diff.txt
            rm -f /tmp/pr_full_diff.txt
          else
            gh pr diff "$PR_NUMBER" | head -c "$MAX_DIFF_BYTES" > /tmp/pr_diff.txt
          fi

          PR_TITLE=$(gh pr view "$PR_NUMBER" --json title -q '.title')
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body -q '.body' | head -c 2000)

          PRIOR_REVIEWS=""
          if [ "$ROUND" -gt 1 ]; then
            PRIOR_REVIEWS=$(gh pr view "$PR_NUMBER" --json comments -q '
              [.comments[] | select(.body | startswith("**Auto Review")) | .body] | join("\n---\n")
            ' 2>/dev/null | head -c 10000)
          fi

          PR_TITLE="$PR_TITLE" PR_BODY="$PR_BODY" REPO="$REPO" PR_NUMBER="$PR_NUMBER" ROUND="$ROUND" PRIOR_REVIEWS="$PRIOR_REVIEWS" DIFF_STAT="$DIFF_STAT" python3 << 'PYEOF' > /tmp/review_payload.json
          import json, os

          with open('/tmp/pr_diff.txt') as f:
              diff = f.read()

          diff_stat = os.environ.get('DIFF_STAT', '').strip()
          repo = os.environ['REPO']
          pr_number = os.environ['PR_NUMBER']
          round_num = int(os.environ['ROUND'])
          title = os.environ['PR_TITLE']
          body = os.environ['PR_BODY']
          prior_reviews = os.environ.get('PRIOR_REVIEWS', '')

          stat_section = f"\n\nFull change statistics:\n{diff_stat}\n" if diff_stat else ""

          if round_num >= 2 and prior_reviews.strip():
              task = f"""Review PR #{pr_number} code changes. Repo: {repo}. Round {round_num}.

          PR title: {title}
          PR description: {body}
          {stat_section}

          IMPORTANT: This is round {round_num}. Previous review comments:

          {prior_reviews}

          Only verify whether previous issues have been fixed. Do not raise new issues.
          If all prior issues are resolved, set approved to true.

          Code changes (diff):
          {diff}

          Return review result as JSON:
          - approved: true/false
          - summary: review summary
          - comments: array of objects with file, line, comment"""
          else:
              task = f"""Review PR #{pr_number} code changes. Repo: {repo}. Round {round_num}.

          PR title: {title}
          PR description: {body}
          {stat_section}

          Code changes (diff):
          {diff}

          Return review result as JSON:
          - approved: true/false
          - summary: review summary
          - comments: array of objects with file, line, comment"""

          print(json.dumps({'task': task, 'format': 'json', 'user_id': 'github-actions'}))
          PYEOF

          SUBMIT=$(curl -s -X POST "https://crew.knowlyr.com/run/employee/code-reviewer" \
            -H "Authorization: Bearer ${CREW_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @/tmp/review_payload.json)

          TASK_ID=$(echo "$SUBMIT" | python3 -c "import json,sys; print(json.load(sys.stdin).get('task_id',''))" 2>/dev/null)
          if [ -z "$TASK_ID" ]; then
            echo "Failed to submit review task: $SUBMIT — skipping review (not blocking PR)"
            RESULT='{"approved": "skip", "summary": "Failed to submit review task", "comments": []}'
          else
            echo "Review task submitted: $TASK_ID — polling for result..."

            POLL_TIMEOUT=${{ inputs.review_timeout }}
            POLL_INTERVAL=10
            POLL_ELAPSED=0
            RESPONSE=""

            while [ $POLL_ELAPSED -lt $POLL_TIMEOUT ]; do
              sleep $POLL_INTERVAL
              POLL_ELAPSED=$((POLL_ELAPSED + POLL_INTERVAL))
              POLL_RESP=$(curl -s "https://crew.knowlyr.com/tasks/${TASK_ID}?user_id=github-actions" \
                -H "Authorization: Bearer ${CREW_API_TOKEN}")
              STATUS=$(echo "$POLL_RESP" | python3 -c "import json,sys; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null)

              if [ "$STATUS" = "completed" ]; then
                RESPONSE="$POLL_RESP"
                echo "Review completed (${POLL_ELAPSED}s)"
                break
              elif [ "$STATUS" = "failed" ]; then
                echo "Review task failed"
                break
              fi
              echo "  Still running... (${POLL_ELAPSED}s / ${POLL_TIMEOUT}s)"
            done

            if [ -z "$RESPONSE" ]; then
              echo "Review task timed out or failed — skipping review (not blocking PR)"
              RESULT='{"approved": "skip", "summary": "Review task timed out", "comments": []}'
            else
              RESULT=$(echo "$RESPONSE" | python3 -c "
          import json, sys

          data = json.load(sys.stdin)
          result = data.get('result', {})
          text = result.get('output', '') if isinstance(result, dict) else str(result)

          def validate(obj):
              if not isinstance(obj, dict) or 'approved' not in obj:
                  return None
              approved = obj['approved']
              if isinstance(approved, str):
                  obj['approved'] = approved.lower() in ('true', '1', 'yes')
              elif not isinstance(approved, bool):
                  obj['approved'] = bool(approved)
              if not isinstance(obj.get('comments'), list):
                  obj['comments'] = []
              if 'summary' not in obj:
                  obj['summary'] = ''
              return obj

          parsed = None

          try:
              candidate = json.loads(text.strip())
              parsed = validate(candidate)
          except (json.JSONDecodeError, ValueError):
              pass

          # Strategy 2: Delimiter extraction (O(n))
          START_MARKER = '---REVIEW_JSON_START---'
          END_MARKER = '---REVIEW_JSON_END---'
          if not parsed and START_MARKER in text and END_MARKER in text:
              json_str = text.split(START_MARKER, 1)[1].split(END_MARKER, 1)[0].strip()
              try:
                  parsed = validate(json.loads(json_str))
              except (json.JSONDecodeError, ValueError):
                  pass

          if not parsed:
              for i, ch in enumerate(text):
                  if ch == '{':
                      for j in range(len(text), i, -1):
                          if text[j-1] == '}':
                              try:
                                  candidate = json.loads(text[i:j])
                                  v = validate(candidate)
                                  if v:
                                      parsed = v
                                      break
                              except (json.JSONDecodeError, ValueError):
                                  continue
                      if parsed:
                          break

          if parsed:
              print(json.dumps(parsed))
          else:
              fallback = {
                  'approved': False,
                  'summary': '[JSON parse failed] Raw output: ' + text[:1500],
                  'comments': [],
                  '_parse_failed': True
              }
              print(json.dumps(fallback))
          " 2>/dev/null || echo '{\"approved\": false, \"summary\": \"Failed to parse review response\", \"comments\": [], \"_parse_failed\": true}')
            fi
          fi

          APPROVED=$(echo "$RESULT" | python3 -c "import json,sys; print(json.load(sys.stdin).get('approved', False))")
          SUMMARY=$(echo "$RESULT" | python3 -c "import json,sys; print(json.load(sys.stdin).get('summary', 'No summary'))")
          PARSE_FAILED=$(echo "$RESULT" | python3 -c "import json,sys; print(json.load(sys.stdin).get('_parse_failed', False))")
          COMMENTS=$(echo "$RESULT" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          comments = data.get('comments', [])
          for c in comments:
              f = c.get('file', '')
              l = c.get('line', '')
              msg = c.get('comment', '')
              if f:
                  print(f'- **{f}**{(\" L\"+str(l)) if l else \"\"}: {msg}')
              else:
                  print(f'- {msg}')
          ")

          echo "approved=$APPROVED" >> "$GITHUB_OUTPUT"
          echo "round=$ROUND" >> "$GITHUB_OUTPUT"
          echo "parse_failed=$PARSE_FAILED" >> "$GITHUB_OUTPUT"

          echo "$SUMMARY" > /tmp/review_summary.txt
          echo "$COMMENTS" > /tmp/review_comments.txt

          rm -f /tmp/pr_diff.txt /tmp/review_payload.json

      - name: Apply review result
        if: steps.token_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CREW_API_TOKEN: ${{ secrets.CREW_API_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          APPROVED="${{ steps.review.outputs.approved }}"
          ROUND=${{ steps.review.outputs.round }}
          PARSE_FAILED="${{ steps.review.outputs.parse_failed }}"
          SUMMARY=$(cat /tmp/review_summary.txt)
          COMMENTS=$(cat /tmp/review_comments.txt)

          ESCALATION_ROUND=${{ inputs.escalation_round }}
          AUTO_DISPATCH_ROUND=${{ inputs.auto_dispatch_round }}
          DISPATCH_EMPLOYEE="${{ inputs.dispatch_employee }}"

          gh pr edit "$PR_NUMBER" --add-label "review-round-${ROUND}" 2>/dev/null || \
            { gh label create "review-round-${ROUND}" --color "0E8A16" 2>/dev/null; \
              gh pr edit "$PR_NUMBER" --add-label "review-round-${ROUND}"; }

          PARSE_NOTICE=""
          if [ "$PARSE_FAILED" = "True" ] || [ "$PARSE_FAILED" = "true" ]; then
            PARSE_NOTICE="
          > **Note:** JSON parsing failed for reviewer output. Raw output shown below for debugging."
          fi

          if [ "$APPROVED" = "skip" ]; then
            echo "Review skipped (timeout or submit failure) — not blocking PR"
            gh pr comment "$PR_NUMBER" --body "$(cat <<EOF
          **Auto Review (Round ${ROUND}) — Skipped**

          ${SUMMARY}

          Review task timed out or failed to submit. Not blocking PR.
          EOF
          )"
            exit 0

          elif [ "$APPROVED" = "True" ] || [ "$APPROVED" = "true" ]; then
            echo "PR approved by code reviewer"
            gh pr comment "$PR_NUMBER" --body "$(cat <<EOF
          **Auto Review (Round ${ROUND}) — Approved**

          ${SUMMARY}
          ${PARSE_NOTICE}
          EOF
          )"

            gh pr merge "$PR_NUMBER" --squash --auto
            exit 0

          else
            echo "PR not approved — review has issues"
            gh pr comment "$PR_NUMBER" --body "$(cat <<EOF
          **Auto Review (Round ${ROUND}) — Changes Requested**

          ${SUMMARY}

          ${COMMENTS}
          ${PARSE_NOTICE}
          EOF
          )"

            if [ "$ROUND" -le "$AUTO_DISPATCH_ROUND" ] && [ -n "${CREW_API_TOKEN}" ]; then
              if [ -n "$DISPATCH_EMPLOYEE" ]; then
                if ! echo "$DISPATCH_EMPLOYEE" | grep -qE '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'; then
                  echo "::error::Invalid dispatch_employee slug: $DISPATCH_EMPLOYEE"
                  exit 1
                fi
                DISPATCH_TARGET="$DISPATCH_EMPLOYEE"
              else
                DISPATCH_TARGET="ceo-assistant"
              fi

              PR_NUMBER="$PR_NUMBER" ROUND="$ROUND" REPO="$REPO" DISPATCH_TARGET="$DISPATCH_TARGET" python3 << 'PYEOF' > /tmp/dispatch_payload.json
          import json, os
          summary = open('/tmp/review_summary.txt').read()
          comments = open('/tmp/review_comments.txt').read()
          target = os.environ['DISPATCH_TARGET']
          pr = os.environ['PR_NUMBER']
          rd = os.environ['ROUND']
          repo = os.environ['REPO']

          if target == 'ceo-assistant':
              task = f"""PR #{pr} round {rd} review failed. Repo: {repo}

          Review summary:
          {summary}

          {comments}

          Please dispatch the appropriate engineer to fix and push code to trigger the next review round."""
          else:
              task = f"""PR #{pr} round {rd} review failed. Repo: {repo}

          Review summary:
          {summary}

          {comments}

          Please fix the issues and push code to trigger the next review round."""

          print(json.dumps({'task': task}))
          PYEOF

              DISPATCH_RESP=$(curl -s -w "\n%{http_code}" -X POST "https://crew.knowlyr.com/run/employee/${DISPATCH_TARGET}" \
                -H "Authorization: Bearer ${CREW_API_TOKEN}" \
                -H "Content-Type: application/json" \
                -d @/tmp/dispatch_payload.json)
              HTTP_CODE=$(echo "$DISPATCH_RESP" | tail -n1)
              if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
                echo "::warning::Auto-dispatch to ${DISPATCH_TARGET} failed (HTTP $HTTP_CODE)"
              else
                echo "Auto-dispatch: review feedback sent to ${DISPATCH_TARGET}"
              fi
              rm -f /tmp/dispatch_payload.json
            fi

            if [ "$ROUND" -ge "$ESCALATION_ROUND" ]; then
              echo "Round ${ROUND}: escalating to human review"
              gh label create "needs-human-review" --color "D93F0B" 2>/dev/null || true
              gh pr edit "$PR_NUMBER" --add-label "needs-human-review"

              if [ -n "${CREW_API_TOKEN}" ]; then
                PR_NUMBER="$PR_NUMBER" ROUND="$ROUND" REPO="$REPO" python3 << 'PYEOF' > /tmp/escalate_payload.json
          import json, os
          task = f"PR #{os.environ['PR_NUMBER']} failed review after {os.environ['ROUND']} rounds. Repo: {os.environ['REPO']}. Please notify Kai via Feishu."
          print(json.dumps({'task': task}))
          PYEOF

                ESCALATE_RESP=$(curl -s -w "\n%{http_code}" -X POST "https://crew.knowlyr.com/run/employee/ceo-assistant" \
                  -H "Authorization: Bearer ${CREW_API_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d @/tmp/escalate_payload.json)
                HTTP_CODE=$(echo "$ESCALATE_RESP" | tail -n1)
                if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
                  echo "::warning::Human review notification failed (HTTP $HTTP_CODE)"
                else
                  echo "Human review notification sent"
                fi
                rm -f /tmp/escalate_payload.json
              fi
            fi

            if [ "$ROUND" -ge "$ESCALATION_ROUND" ]; then
              echo "::warning::Round ${ROUND} review not approved — not blocking PR (needs-human-review label added)"
              exit 0
            else
              exit 1
            fi
          fi
