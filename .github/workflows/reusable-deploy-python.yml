name: Reusable Python Deploy

on:
  workflow_call:
    inputs:
      app_dir:
        description: "Server deployment directory (e.g. /var/www/knowlyr-id)"
        required: true
        type: string
      service_name:
        description: "systemd service name"
        required: true
        type: string
      summary_subject:
        description: "Human-readable subject shown in deploy receipt"
        required: false
        type: string
        default: ""
      public_url:
        description: "Optional public URL shown in deploy receipt"
        required: false
        type: string
        default: ""
      health_url:
        description: "Health check URL (e.g. http://127.0.0.1:8100/health)"
        required: true
        type: string
      health_wait:
        description: "Seconds to wait after restart before health check"
        required: false
        type: number
        default: 8
      install_command:
        description: "Dependency install command (run inside venv)"
        required: false
        type: string
        default: "pip install -q -r requirements.txt"
      run_migrations:
        description: "Whether to run alembic upgrade head"
        required: false
        type: boolean
        default: false
      rsync_excludes:
        description: "Comma-separated rsync exclude list"
        required: false
        type: string
        default: ".git,.github,.env,.venv,__pycache__,.claude"
      rsync_source:
        description: "Local source path for rsync"
        required: false
        type: string
        default: "./"
      extra_services:
        description: "Comma-separated extra systemd services to restart"
        required: false
        type: string
        default: ""
      auto_tag:
        description: "Whether to auto-create a version tag after deploy"
        required: false
        type: boolean
        default: true
      tag_prefix:
        description: "Tag prefix (e.g. v or backend-v)"
        required: false
        type: string
        default: "v"
      pre_deploy_script:
        description: "Script to run on server before rsync (executed via bash)"
        required: false
        type: string
        default: ""
      post_deploy_script:
        description: "Script to run on server after successful deploy"
        required: false
        type: string
        default: ""
    secrets:
      SSH_KEY:
        required: true
      SSH_HOST:
        required: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Initialize deploy report workspace
        run: |
          mkdir -p artifacts
          {
            echo "DEPLOY_PHASE=snapshot"
            echo "ROLLBACK_ATTEMPTED=false"
            echo "ROLLBACK_RESULT=not_needed"
          } >> "$GITHUB_ENV"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Snapshot for rollback
        run: |
          echo "DEPLOY_PHASE=snapshot" >> "$GITHUB_ENV"
          ssh -i ~/.ssh/key.pem root@${{ secrets.SSH_HOST }} bash -s <<'REMOTE'
            set -euo pipefail
            APP_DIR="${{ inputs.app_dir }}"
            if [ -d "$APP_DIR" ]; then
              if [ -L "${APP_DIR}.prev" ]; then
                echo "ERROR: ${APP_DIR}.prev is a symlink, aborting"
                exit 1
              fi
              rm -rf "${APP_DIR}.prev"
              cp -a "$APP_DIR" "${APP_DIR}.prev"
              echo "Snapshot saved to ${APP_DIR}.prev"
            fi
          REMOTE

      - name: Run pre-deploy script
        if: inputs.pre_deploy_script != ''
        run: |
          echo "DEPLOY_PHASE=pre_deploy_script" >> "$GITHUB_ENV"
          ssh -i ~/.ssh/key.pem root@${{ secrets.SSH_HOST }} bash -s <<'REMOTE'
            set -euo pipefail
            ${{ inputs.pre_deploy_script }}
          REMOTE

      - name: Deploy code via rsync
        run: |
          echo "DEPLOY_PHASE=deploy_code" >> "$GITHUB_ENV"
          ARGS=(rsync -avz --delete)
          IFS=',' read -ra ITEMS <<< "${{ inputs.rsync_excludes }}"
          for item in "${ITEMS[@]}"; do
            ARGS+=(--exclude="$(echo "$item" | xargs)")
          done
          ARGS+=(-e "ssh -i ~/.ssh/key.pem -o StrictHostKeyChecking=yes")
          ARGS+=("${{ inputs.rsync_source }}" "root@${{ secrets.SSH_HOST }}:${{ inputs.app_dir }}/")
          "${ARGS[@]}"

      - name: Install dependencies
        run: |
          echo "DEPLOY_PHASE=install_dependencies" >> "$GITHUB_ENV"
          ssh -i ~/.ssh/key.pem root@${{ secrets.SSH_HOST }} bash -s <<'REMOTE'
            set -euo pipefail
            cd "${{ inputs.app_dir }}"
            if [ ! -d .venv ]; then
              echo "Creating virtual environment..."
              python3 -m venv .venv
            fi
            source .venv/bin/activate
            ${{ inputs.install_command }}
          REMOTE

      - name: Run database migrations
        if: inputs.run_migrations
        run: |
          echo "DEPLOY_PHASE=run_migrations" >> "$GITHUB_ENV"
          ssh -i ~/.ssh/key.pem root@${{ secrets.SSH_HOST }} bash -s <<'REMOTE'
            set -euo pipefail
            cd "${{ inputs.app_dir }}"
            source .venv/bin/activate
            set -a; source .env; set +a
            alembic upgrade head
          REMOTE

      - name: Restart services
        run: |
          echo "DEPLOY_PHASE=restart_services" >> "$GITHUB_ENV"
          ssh -i ~/.ssh/key.pem root@${{ secrets.SSH_HOST }} bash -s <<'REMOTE'
            set -euo pipefail
            systemctl restart "${{ inputs.service_name }}"
            echo "Restarted ${{ inputs.service_name }}"

            EXTRA="${{ inputs.extra_services }}"
            if [ -n "$EXTRA" ]; then
              IFS=',' read -ra SVCS <<< "$EXTRA"
              for svc in "${SVCS[@]}"; do
                svc=$(echo "$svc" | xargs)
                if systemctl is-enabled "$svc" 2>/dev/null; then
                  systemctl restart "$svc"
                  echo "Restarted $svc"
                else
                  echo "Skipped $svc (not enabled)"
                fi
              done
            fi
          REMOTE

      - name: Health check
        run: |
          echo "DEPLOY_PHASE=health_check" >> "$GITHUB_ENV"
          mkdir -p artifacts
          echo "Waiting ${{ inputs.health_wait }} seconds for service to start..."
          sleep ${{ inputs.health_wait }}
          STATUS=$(ssh -i ~/.ssh/key.pem root@${{ secrets.SSH_HOST }} \
            "curl -sf -o /dev/null -w '%{http_code}' ${{ inputs.health_url }}" || true)
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed - HTTP $STATUS"
            python3 - <<'PY'
            import json
            from pathlib import Path

            payload = {
                "status": "success",
                "check_type": "http_health_check",
                "target": "${{ inputs.health_url }}",
                "expected_status": 200,
                "observed_status": 200,
                "wait_seconds": ${{ inputs.health_wait }},
                "summary": "上线后检查通过（HTTP 200）",
            }
            Path("artifacts/release-smoke.json").write_text(
                json.dumps(payload, ensure_ascii=False, indent=2) + "\n",
                encoding="utf-8",
            )
            PY
            {
              echo "DEPLOY_PHASE=completed"
              echo "ROLLBACK_ATTEMPTED=false"
              echo "ROLLBACK_RESULT=not_needed"
            } >> "$GITHUB_ENV"
          else
            echo "Health check FAILED - HTTP $STATUS"
            echo ""
            echo "=== Recent service logs ==="
            ssh -i ~/.ssh/key.pem root@${{ secrets.SSH_HOST }} \
              "journalctl -u ${{ inputs.service_name }} -n 40 --no-pager" || true
            echo ""
            echo "=== Rolling back to previous version ==="
            ROLLBACK_STATUS="failed"
            if ssh -i ~/.ssh/key.pem root@${{ secrets.SSH_HOST }} bash -s <<'REMOTE'
              set -euo pipefail
              APP_DIR="${{ inputs.app_dir }}"
              if [ -d "${APP_DIR}.prev" ]; then
                if [ -L "$APP_DIR" ]; then
                  echo "ERROR: $APP_DIR is a symlink, aborting rollback"
                  exit 1
                fi
                rm -rf "$APP_DIR"
                mv "${APP_DIR}.prev" "$APP_DIR"
                systemctl restart "${{ inputs.service_name }}"
                echo "Rolled back and restarted ${{ inputs.service_name }}"
                exit 0
              fi
              echo "No .prev snapshot found, cannot rollback"
              exit 2
          REMOTE
            then
              ROLLBACK_STATUS="success"
            else
              rc=$?
              if [ "$rc" = "2" ]; then
                ROLLBACK_STATUS="not_available"
              fi
            fi
            {
              echo "ROLLBACK_ATTEMPTED=true"
              echo "ROLLBACK_RESULT=$ROLLBACK_STATUS"
            } >> "$GITHUB_ENV"
            python3 - <<PY
            import json
            from pathlib import Path

            payload = {
                "status": "failure",
                "check_type": "http_health_check",
                "target": "${{ inputs.health_url }}",
                "expected_status": 200,
                "observed_status": "${STATUS}",
                "wait_seconds": ${{ inputs.health_wait }},
                "rollback_attempted": True,
                "rollback_result": "${ROLLBACK_STATUS}",
                "summary": f"上线后检查失败（HTTP {'${STATUS}' or '无响应'}）",
            }
            Path("artifacts/release-smoke.json").write_text(
                json.dumps(payload, ensure_ascii=False, indent=2) + "\n",
                encoding="utf-8",
            )
            PY
            exit 1
          fi

      - name: Run post-deploy script
        if: inputs.post_deploy_script != ''
        run: |
          echo "DEPLOY_PHASE=post_deploy_script" >> "$GITHUB_ENV"
          ssh -i ~/.ssh/key.pem root@${{ secrets.SSH_HOST }} bash -s <<'REMOTE'
            set -euo pipefail
            ${{ inputs.post_deploy_script }}
          REMOTE

      - name: Auto version tag
        if: inputs.auto_tag
        run: |
          echo "DEPLOY_PHASE=auto_tag" >> "$GITHUB_ENV"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG_PREFIX="${{ inputs.tag_prefix }}"
          LATEST=$(git tag -l "${TAG_PREFIX}*" --sort=-version:refname | head -1)

          if [ -z "$LATEST" ]; then
            NEXT="${TAG_PREFIX}0.1.0"
          else
            # Extract version numbers after the prefix
            VERSION="${LATEST#$TAG_PREFIX}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEXT="${TAG_PREFIX}${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          SUBJECT=$(git log -1 --format=%s)
          git tag -a "$NEXT" -m "$NEXT - $SUBJECT"
          git push origin "$NEXT"
          echo "### Tagged $NEXT" >> $GITHUB_STEP_SUMMARY
          echo "DEPLOY_PHASE=completed" >> "$GITHUB_ENV"

      - name: Mark deploy completed
        if: success() && !inputs.auto_tag
        run: echo "DEPLOY_PHASE=completed" >> "$GITHUB_ENV"

      - name: Write deploy report
        if: always()
        env:
          DEPLOY_STATUS: ${{ job.status }}
        run: |
          STATUS="$DEPLOY_STATUS"
          if [ "$STATUS" != "success" ]; then
            STATUS="failure"
          fi
          python3 scripts/deploy/write_report.py \
            --output-dir artifacts \
            --status "$STATUS" \
            --subject "${{ inputs.summary_subject }}" \
            --public-url "${{ inputs.public_url }}" \
            --health-url "${{ inputs.health_url }}" \
            --service-name "${{ inputs.service_name }}" \
            --target-path "${{ inputs.app_dir }}" \
            --phase "${DEPLOY_PHASE:-unknown}" \
            --rollback-attempted "${ROLLBACK_ATTEMPTED:-false}" \
            --rollback-result "${ROLLBACK_RESULT:-}" \
            --smoke-file artifacts/release-smoke.json \
            --legacy-receipt deploy-receipt.txt
          cat artifacts/deploy-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deploy receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-receipt
          path: |
            artifacts
            deploy-receipt.txt
          if-no-files-found: ignore
