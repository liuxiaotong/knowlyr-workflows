name: Reusable Static Site Deploy

on:
  workflow_call:
    inputs:
      webroot:
        description: "Production directory (e.g. /var/www/knowlyr.com)"
        required: true
        type: string
      summary_subject:
        description: "Human-readable subject shown in deploy receipt"
        required: false
        type: string
        default: ""
      public_url:
        description: "Optional public URL shown in deploy receipt"
        required: false
        type: string
        default: ""
      build_command:
        description: "Build command (e.g. python3 scripts/build.py)"
        required: true
        type: string
      build_deps:
        description: "Build dependency install command"
        required: false
        type: string
        default: ""
      verify_files:
        description: "Comma-separated list of files that must exist after build"
        required: true
        type: string
      rsync_excludes:
        description: "Comma-separated rsync exclude list"
        required: false
        type: string
        default: ".git,.github,scripts,__pycache__,.claude,content,private,tests,CLAUDE.md,README.md,CHANGELOG.md"
      post_deploy_script:
        description: "Script to run on server after deploy (e.g. nginx cache config)"
        required: false
        type: string
        default: ""
      restore_dirs:
        description: "Comma-separated dirs to restore from .prev after atomic switch (e.g. tools)"
        required: false
        type: string
        default: ""
      auto_tag:
        description: "Whether to auto-create a version tag after deploy"
        required: false
        type: boolean
        default: true
    secrets:
      SSH_KEY:
        required: true
      SSH_HOST:
        required: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Initialize deploy report workspace
        run: |
          mkdir -p artifacts
          {
            echo "DEPLOY_PHASE=install_build_dependencies"
            echo "ROLLBACK_ATTEMPTED=false"
            echo "ROLLBACK_RESULT=not_needed"
          } >> "$GITHUB_ENV"

      - name: Prepare deploy helper scripts
        run: |
          cat > "$RUNNER_TEMP/write_release_smoke.py" <<'PY'
          #!/usr/bin/env python3
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          verified = Path("artifacts/staging-verified-files.txt").read_text(encoding="utf-8").splitlines()
          missing = Path("artifacts/staging-missing-files.txt").read_text(encoding="utf-8").splitlines()
          size = int(os.environ.get("INDEX_SIZE", "0"))
          index_too_small = os.environ.get("INDEX_TOO_SMALL", "false").lower() == "true"
          status = os.environ.get("SMOKE_STATUS", "failure")
          target = os.environ.get("RELEASE_SMOKE_TARGET", "")

          if status == "success":
              payload = {
                  "status": "success",
                  "check_type": "static_site_verification",
                  "target": target,
                  "verified_files": verified,
                  "missing_files": [],
                  "index_html_size": size,
                  "summary": f"构建校验和预发布检查通过（关键文件 {len(verified)} 个，index.html {size}B）",
              }
          else:
              summary_parts = []
              if missing:
                  summary_parts.append(f"缺少关键文件 {len(missing)} 个")
              if index_too_small:
                  summary_parts.append(f"index.html 过小（{size}B）")
              payload = {
                  "status": "failure",
                  "check_type": "static_site_verification",
                  "target": target,
                  "verified_files": verified,
                  "missing_files": missing,
                  "index_html_size": size,
                  "summary": "预发布检查失败（" + "，".join(summary_parts or ["请看日志"]) + "）",
              }

          Path("artifacts/release-smoke.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          chmod +x "$RUNNER_TEMP/write_release_smoke.py"

          # Keep in sync with scripts/deploy/write_report.py.
          cat > "$RUNNER_TEMP/write_report.py" <<'PY'
          #!/usr/bin/env python3
          from __future__ import annotations

          import argparse
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path
          from typing import Any


          PHASE_LABELS = {
              "install_dependencies": "安装依赖",
              "install_build_dependencies": "安装构建依赖",
              "build": "构建",
              "build_site": "构建站点",
              "prepare_bundle": "打包产物",
              "snapshot": "创建回滚快照",
              "stop_service": "停止旧服务",
              "pre_deploy_script": "执行发布前脚本",
              "deploy_code": "同步代码",
              "deploy_staging": "发布到预发布目录",
              "write_server_env": "写入服务器环境变量",
              "restart_services": "重启服务",
              "run_migrations": "执行数据库迁移",
              "post_deploy_script": "执行发布后脚本",
              "health_check": "上线后检查",
              "verify_build": "构建校验",
              "staging_health_check": "预发布校验",
              "atomic_switch": "原子切换",
              "restore_server_dirs": "恢复服务器托管目录",
              "cleanup": "清理备份",
              "completed": "完成",
          }


          def parse_args() -> argparse.Namespace:
              parser = argparse.ArgumentParser(description="Generate deploy receipt artifacts.")
              parser.add_argument("--output-dir", required=True)
              parser.add_argument("--status", required=True, choices=("success", "failure"))
              parser.add_argument("--subject", default="")
              parser.add_argument("--public-url", default="")
              parser.add_argument("--health-url", default="")
              parser.add_argument("--service-name", default="")
              parser.add_argument("--target-path", default="")
              parser.add_argument("--phase", default="")
              parser.add_argument("--rollback-attempted", default="false")
              parser.add_argument("--rollback-result", default="")
              parser.add_argument("--smoke-file", default="")
              parser.add_argument("--legacy-receipt", default="")
              return parser.parse_args()


          def to_bool(raw: str) -> bool:
              return raw.strip().lower() in {"1", "true", "yes", "y", "on"}


          def load_json(path: str) -> dict[str, Any]:
              if not path:
                  return {}
              candidate = Path(path)
              if not candidate.exists():
                  return {}
              return json.loads(candidate.read_text(encoding="utf-8"))


          def phase_label(phase: str) -> str:
              return PHASE_LABELS.get(phase, phase or "未知阶段")


          def smoke_summary(smoke: dict[str, Any], status: str, phase: str) -> str:
              if smoke.get("summary"):
                  return str(smoke["summary"])
              if smoke.get("status") == "success":
                  return "上线后检查通过"
              if smoke.get("status") == "failure":
                  return "上线后检查失败"
              if status == "failure":
                  return f"未完成，当前卡在“{phase_label(phase)}”"
              return "已完成，但未写入详细上线后检查摘要"


          def rollback_summary(attempted: bool, result: str) -> str:
              if not attempted:
                  if result == "available_if_needed":
                      return "未触发，回滚路径仍可用"
                  return "未触发"
              mapping = {
                  "success": "已成功",
                  "failed": "尝试了，但失败",
                  "not_available": "尝试了，但缺少可用回滚快照",
                  "partial": "已触发，结果需要人工复核",
              }
              return mapping.get(result, result or "已触发，结果待确认")


          def repo_name(full_name: str) -> str:
              if "/" in full_name:
                  return full_name.split("/", 1)[1]
              return full_name


          def build_markdown(
              *,
              status: str,
              subject: str,
              public_url: str,
              run_url: str,
              health_url: str,
              service_name: str,
              target_path: str,
              commit_short: str,
              phase: str,
              smoke_summary_text: str,
              rollback_text: str,
          ) -> str:
              title = "✅ {} 部署成功，已经上线" if status == "success" else "❌ {} 这次没发成，线上可能还是旧版本"
              lines = [
                  "## 墨言回执",
                  title.format(subject),
                  "",
                  "你现在只需要知道：",
              ]
              if status == "success":
                  lines.append(f"- {smoke_summary_text}")
                  lines.append(f"- 回滚路径：{rollback_text}")
                  if public_url:
                      lines.append(f"- 产品地址：{public_url}")
                  lines.append(f"- 版本：{commit_short}")
              else:
                  lines.append(f"- 卡在：{phase_label(phase)}")
                  lines.append(f"- 上线后检查：{smoke_summary_text}")
                  lines.append(f"- 自动回滚：{rollback_text}")
                  if public_url:
                      lines.append(f"- 对外地址暂时还是原来的：{public_url}")
                  lines.append(f"- 计划发布版本：{commit_short}")

              lines.extend(["", "排查时再看：", f"- 发布记录：{run_url}"])
              if health_url:
                  lines.append(f"- 检查入口：{health_url}")
              if service_name:
                  lines.append(f"- 服务名：{service_name}")
              if target_path:
                  lines.append(f"- 目标路径：{target_path}")
              return "\n".join(lines).strip() + "\n"


          def build_plain_text(markdown: str) -> str:
              return markdown.replace("## ", "").replace("**", "")


          def main() -> None:
              args = parse_args()
              output_dir = Path(args.output_dir)
              output_dir.mkdir(parents=True, exist_ok=True)

              smoke = load_json(args.smoke_file)

              github_repository = os.getenv("GITHUB_REPOSITORY", "")
              github_sha = os.getenv("GITHUB_SHA", "")
              commit_short = github_sha[:7] if github_sha else ""
              server_url = os.getenv("GITHUB_SERVER_URL", "https://github.com")
              run_id = os.getenv("GITHUB_RUN_ID", "")
              run_url = f"{server_url}/{github_repository}/actions/runs/{run_id}" if github_repository and run_id else ""
              commit_url = f"{server_url}/{github_repository}/commit/{github_sha}" if github_repository and github_sha else ""
              subject = args.subject or repo_name(github_repository or "deploy")

              rollback_attempted = to_bool(args.rollback_attempted)
              rollback_result = args.rollback_result.strip()
              smoke_summary_text = smoke_summary(smoke, args.status, args.phase)
              rollback_text = rollback_summary(rollback_attempted, rollback_result)
              markdown = build_markdown(
                  status=args.status,
                  subject=subject,
                  public_url=args.public_url.strip(),
                  run_url=run_url,
                  health_url=args.health_url.strip(),
                  service_name=args.service_name.strip(),
                  target_path=args.target_path.strip(),
                  commit_short=commit_short or "unknown",
                  phase=args.phase.strip(),
                  smoke_summary_text=smoke_summary_text,
                  rollback_text=rollback_text,
              )
              plain_text = build_plain_text(markdown)

              payload = {
                  "status": args.status,
                  "repo": github_repository,
                  "repo_name": repo_name(github_repository or ""),
                  "subject": subject,
                  "sha": github_sha,
                  "commit_short": commit_short,
                  "commit_url": commit_url,
                  "run_url": run_url,
                  "event_name": os.getenv("GITHUB_EVENT_NAME", ""),
                  "ref_name": os.getenv("GITHUB_REF_NAME", ""),
                  "public_url": args.public_url.strip() or None,
                  "phase": args.phase.strip(),
                  "phase_label": phase_label(args.phase.strip()),
                  "rollback_attempted": rollback_attempted,
                  "rollback_result": rollback_result or None,
                  "rollback_summary": rollback_text,
                  "smoke_summary": smoke_summary_text,
                  "release_smoke": smoke or None,
                  "summary_markdown": markdown,
                  "receipt_text": plain_text,
                  "generated_at": datetime.now(timezone.utc).isoformat(),
              }

              (output_dir / "deploy-report.json").write_text(
                  json.dumps(payload, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
              )
              (output_dir / "deploy-report.md").write_text(markdown, encoding="utf-8")

              if args.legacy_receipt:
                  Path(args.legacy_receipt).write_text(plain_text, encoding="utf-8")


          if __name__ == "__main__":
              main()
          PY
          chmod +x "$RUNNER_TEMP/write_report.py"

      - name: Install build dependencies
        if: inputs.build_deps != ''
        run: |
          echo "DEPLOY_PHASE=install_build_dependencies" >> "$GITHUB_ENV"
          ${{ inputs.build_deps }}

      - name: Build site
        run: |
          echo "DEPLOY_PHASE=build_site" >> "$GITHUB_ENV"
          ${{ inputs.build_command }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Verify build artifacts
        run: |
          echo "DEPLOY_PHASE=verify_build" >> "$GITHUB_ENV"
          echo "Checking critical files..."
          MISSING=0
          IFS=',' read -ra FILES <<< "${{ inputs.verify_files }}"
          for f in "${FILES[@]}"; do
            f=$(echo "$f" | xargs)
            if [ ! -f "$f" ]; then
              echo "  MISSING: $f"
              MISSING=1
            else
              echo "  OK: $f"
            fi
          done

          if [ "$MISSING" = "1" ]; then
            echo "Build verification FAILED"
            exit 1
          fi
          echo "Build verification passed"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to staging
        run: |
          echo "DEPLOY_PHASE=deploy_staging" >> "$GITHUB_ENV"
          STAGING="${{ inputs.webroot }}.new"
          SSH_OPTS="-i ~/.ssh/key.pem -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes"
          ssh $SSH_OPTS root@${{ secrets.SSH_HOST }} \
            "rm -rf $STAGING && mkdir -p $STAGING"

          ARGS=(rsync -avz --delete)
          IFS=',' read -ra ITEMS <<< "${{ inputs.rsync_excludes }}"
          for item in "${ITEMS[@]}"; do
            ARGS+=(--exclude="$(echo "$item" | xargs)")
          done

          ARGS+=(-e "ssh $SSH_OPTS")
          ARGS+=(./ "root@${{ secrets.SSH_HOST }}:$STAGING/")
          "${ARGS[@]}"

      - name: Health check (staging)
        run: |
          echo "DEPLOY_PHASE=staging_health_check" >> "$GITHUB_ENV"
          mkdir -p artifacts
          STAGING="${{ inputs.webroot }}.new"
          SSH_CMD="ssh -i ~/.ssh/key.pem -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes root@${{ secrets.SSH_HOST }}"
          FAILED=0
          VERIFIED=0
          INDEX_TOO_SMALL=false
          : > artifacts/staging-verified-files.txt
          : > artifacts/staging-missing-files.txt

          IFS=',' read -ra FILES <<< "${{ inputs.verify_files }}"
          for f in "${FILES[@]}"; do
            f=$(echo "$f" | xargs)
            if $SSH_CMD "test -f $STAGING/$f"; then
              echo "  OK   $f"
              echo "$f" >> artifacts/staging-verified-files.txt
              VERIFIED=$((VERIFIED + 1))
            else
              echo "  FAIL $f"
              echo "$f" >> artifacts/staging-missing-files.txt
              FAILED=1
            fi
          done

          # Check index.html content integrity (>1KB)
          SIZE=$($SSH_CMD "stat -c%s $STAGING/index.html" 2>/dev/null || echo "0")
          if [ "$SIZE" -lt 1000 ]; then
            echo "  FAIL index.html too small (${SIZE}B)"
            FAILED=1
            INDEX_TOO_SMALL=true
          else
            echo "  OK   index.html size: ${SIZE}B"
          fi

          export INDEX_SIZE="$SIZE"
          export INDEX_TOO_SMALL
          export VERIFIED_COUNT="$VERIFIED"
          export RELEASE_SMOKE_TARGET="$STAGING"

          if [ "$FAILED" = "1" ]; then
            export SMOKE_STATUS="failure"
            python3 "$RUNNER_TEMP/write_release_smoke.py"
            echo "Health check FAILED - cleaning up staging"
            $SSH_CMD "rm -rf $STAGING"
            exit 1
          fi
          export SMOKE_STATUS="success"
          python3 "$RUNNER_TEMP/write_release_smoke.py"
          echo "Health check passed"

      - name: Atomic switch to live
        run: |
          echo "DEPLOY_PHASE=atomic_switch" >> "$GITHUB_ENV"
          WEBROOT="${{ inputs.webroot }}"
          STAGING="${WEBROOT}.new"
          ssh -i ~/.ssh/key.pem -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes root@${{ secrets.SSH_HOST }} "\
            rm -rf ${WEBROOT}.prev && \
            mv ${WEBROOT} ${WEBROOT}.prev && \
            mv ${STAGING} ${WEBROOT}"
          echo "Deployed to ${WEBROOT} (previous version saved as .prev)"
          echo "ROLLBACK_RESULT=available_if_needed" >> "$GITHUB_ENV"

      - name: Restore server-managed directories
        if: inputs.restore_dirs != ''
        run: |
          echo "DEPLOY_PHASE=restore_server_dirs" >> "$GITHUB_ENV"
          ssh -i ~/.ssh/key.pem -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes root@${{ secrets.SSH_HOST }} bash -s <<'REMOTE'
            set -euo pipefail
            WEBROOT="${{ inputs.webroot }}"
            IFS=',' read -ra DIRS <<< "${{ inputs.restore_dirs }}"
            for d in "${DIRS[@]}"; do
              d=$(echo "$d" | xargs)
              if [ -d "${WEBROOT}.prev/$d" ]; then
                cp -r "${WEBROOT}.prev/$d" "${WEBROOT}/$d"
                echo "  Restored: $d"
              fi
            done
          REMOTE

      - name: Run post-deploy script
        if: inputs.post_deploy_script != ''
        run: |
          echo "DEPLOY_PHASE=post_deploy_script" >> "$GITHUB_ENV"
          ssh -i ~/.ssh/key.pem -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes root@${{ secrets.SSH_HOST }} bash -s <<'REMOTE'
            set -euo pipefail
            ${{ inputs.post_deploy_script }}
          REMOTE

      - name: Auto version tag
        if: inputs.auto_tag
        run: |
          echo "DEPLOY_PHASE=auto_tag" >> "$GITHUB_ENV"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          LATEST=$(git tag -l 'v*' --sort=-version:refname | head -1)

          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0"
          else
            VERSION="${LATEST#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          SUBJECT=$(git log -1 --format=%s)
          git tag -a "$NEXT" -m "$NEXT - $SUBJECT"
          git push origin "$NEXT"
          echo "### Tagged $NEXT" >> $GITHUB_STEP_SUMMARY
          echo "DEPLOY_PHASE=completed" >> "$GITHUB_ENV"

      - name: Mark deploy completed
        if: success() && !inputs.auto_tag
        run: echo "DEPLOY_PHASE=completed" >> "$GITHUB_ENV"

      - name: Write deploy report
        if: always()
        env:
          DEPLOY_STATUS: ${{ job.status }}
        run: |
          STATUS="$DEPLOY_STATUS"
          if [ "$STATUS" != "success" ]; then
            STATUS="failure"
          fi
          python3 "$RUNNER_TEMP/write_report.py" \
            --output-dir artifacts \
            --status "$STATUS" \
            --subject "${{ inputs.summary_subject }}" \
            --public-url "${{ inputs.public_url }}" \
            --target-path "${{ inputs.webroot }}" \
            --phase "${DEPLOY_PHASE:-unknown}" \
            --rollback-attempted "${ROLLBACK_ATTEMPTED:-false}" \
            --rollback-result "${ROLLBACK_RESULT:-}" \
            --smoke-file artifacts/release-smoke.json \
            --legacy-receipt deploy-receipt.txt
          cat artifacts/deploy-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deploy receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-receipt
          path: |
            artifacts
            deploy-receipt.txt
          if-no-files-found: ignore
